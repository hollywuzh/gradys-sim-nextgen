<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1700" viewBox="0 0 1400 1700">
  <defs>
    <style>
      .title { font: 700 32px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #4b5563; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 24; }
      .box1 { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 18; }
      .box2 { fill: #ecfccb; stroke: #65a30d; stroke-width: 2; rx: 18; }
      .box3 { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 18; }
      .box4 { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 18; }
      .box5 { fill: #fce7f3; stroke: #db2777; stroke-width: 2; rx: 18; }
      .note { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 14; }
      .head { font: 700 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #111827; text-anchor: middle; }
      .text { font: 500 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #374151; text-anchor: middle; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow1); }
    </style>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1360" height="1660" class="panel"/>
  <text x="700" y="70" class="title" text-anchor="middle">基于深度强化学习的安全感知多路径路由闭环流程图</text>
  <text x="700" y="102" class="subtitle" text-anchor="middle">对应 Mermaid 文件：drl_routing_sar_flowchart.md</text>

  <rect x="470" y="130" width="460" height="86" class="box1"/>
  <text x="700" y="166" class="head">时隙 k 开始</text>
  <text x="700" y="194" class="text">进入一次新的路由与功率联合决策周期</text>

  <line x1="700" y1="216" x2="700" y2="258" class="arrow"/>

  <rect x="340" y="258" width="720" height="128" class="box1"/>
  <text x="700" y="292" class="head">状态观测 s(k)</text>
  <text x="700" y="320" class="text">邻居动态：n, L, v, h, f</text>
  <text x="700" y="346" class="text">环境扰动：p̂_l, χ, ν̃；自身与业务：b, ς</text>
  <text x="700" y="372" class="text">历史反馈：ρ, τ</text>

  <line x1="700" y1="386" x2="700" y2="428" class="arrow"/>

  <rect x="390" y="428" width="620" height="100" class="box2"/>
  <text x="700" y="462" class="head">状态编码</text>
  <text x="700" y="490" class="text">邻居特征编码 + 全局特征融合</text>
  <text x="700" y="514" class="text">Attention / GNN / MLP</text>

  <line x1="700" y1="528" x2="700" y2="570" class="arrow"/>

  <rect x="500" y="570" width="400" height="86" class="box2"/>
  <text x="700" y="606" class="head">策略网络 πθ(a|s)</text>
  <text x="700" y="634" class="text">根据当前状态输出联合动作</text>

  <line x1="700" y1="656" x2="700" y2="698" class="arrow"/>

  <rect x="380" y="698" width="640" height="112" class="box3"/>
  <text x="700" y="732" class="head">动作 a(k)</text>
  <text x="700" y="760" class="text">下一跳集合 S(k)</text>
  <text x="700" y="786" class="text">发射功率等级 p(k)</text>

  <line x1="700" y1="810" x2="700" y2="852" class="arrow"/>

  <rect x="410" y="852" width="580" height="92" class="box3"/>
  <text x="700" y="888" class="head">执行联合动作</text>
  <text x="700" y="916" class="text">多路径转发 + 功率控制</text>

  <line x1="700" y1="944" x2="700" y2="986" class="arrow"/>

  <rect x="320" y="986" width="760" height="126" class="box4"/>
  <text x="700" y="1020" class="head">网络环境演化</text>
  <text x="700" y="1048" class="text">拓扑变化 / 干扰变化 / 气象变化</text>
  <text x="700" y="1074" class="text">恶意节点行为 / 链路成功或失败</text>
  <text x="700" y="1100" class="text">局部观测状态随环境演化而改变</text>

  <line x1="700" y1="1112" x2="700" y2="1154" class="arrow"/>

  <rect x="340" y="1154" width="720" height="128" class="box5"/>
  <text x="700" y="1188" class="head">获得即时反馈</text>
  <text x="700" y="1216" class="text">packet 交付率 ρ(k)、时延 τ(k)</text>
  <text x="700" y="1242" class="text">丢包 / 重传、能耗 E(k)、风险代价 R(k)</text>
  <text x="700" y="1268" class="text">形成多目标联合反馈</text>

  <line x1="700" y1="1282" x2="700" y2="1324" class="arrow"/>

  <rect x="350" y="1324" width="700" height="108" class="box5"/>
  <text x="700" y="1358" class="head">计算奖励 r(k)</text>
  <text x="700" y="1388" class="text">r = w1·ρ - w2·τ - w3·loss - w4·energy - w5·risk</text>
  <text x="700" y="1414" class="text">依据业务类型可动态调整权重</text>

  <line x1="700" y1="1432" x2="700" y2="1474" class="arrow"/>

  <rect x="390" y="1474" width="620" height="92" class="note"/>
  <text x="700" y="1510" class="head">状态转移与经验存储</text>
  <text x="700" y="1538" class="text">s(k) → s(k+1)，写入 Buffer / Replay / GAE</text>

  <line x1="700" y1="1566" x2="700" y2="1608" class="arrow"/>

  <rect x="370" y="1608" width="660" height="56" class="note"/>
  <text x="700" y="1644" class="text">更新策略与价值网络，得到改进后的策略 πθ*，进入下一时隙循环</text>
</svg>
