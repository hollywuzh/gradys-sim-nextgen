<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f7f4ec; }
      .title { font: 700 34px "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #4b5563; }
      .label { font: 600 22px "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #111827; }
      .text { font: 500 18px "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #374151; }
      .small { font: 500 16px "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #4b5563; }
      .box-title { font: 700 21px "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #111827; }
      .box-text { font: 500 17px "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #374151; }
      .math { font: 600 18px "Consolas", "Microsoft YaHei", monospace; fill: #7c2d12; }
      .timeline { stroke: #1f2937; stroke-width: 5; }
      .tick { stroke: #1f2937; stroke-width: 4; }
      .arrow-blue { stroke: #0f766e; stroke-width: 5; fill: none; marker-end: url(#arrowBlue); }
      .arrow-orange { stroke: #c2410c; stroke-width: 5; fill: none; marker-end: url(#arrowOrange); }
      .arrow-purple { stroke: #7c3aed; stroke-width: 5; fill: none; marker-end: url(#arrowPurple); }
      .arrow-gray { stroke: #6b7280; stroke-width: 4; fill: none; marker-end: url(#arrowGray); }
      .dot-blue { fill: #0f766e; }
      .dot-orange { fill: #c2410c; }
      .dot-purple { fill: #7c3aed; }
      .card { fill: #fffdf8; stroke: #d6d3d1; stroke-width: 2; rx: 22; ry: 22; }
      .blue-box { fill: #dff7f3; stroke: #0f766e; stroke-width: 2; rx: 20; ry: 20; }
      .orange-box { fill: #ffedd5; stroke: #c2410c; stroke-width: 2; rx: 20; ry: 20; }
      .purple-box { fill: #efe7ff; stroke: #7c3aed; stroke-width: 2; rx: 20; ry: 20; }
      .gray-box { fill: #f3f4f6; stroke: #6b7280; stroke-width: 2; rx: 20; ry: 20; }
    </style>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#c2410c"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <text x="800" y="70" text-anchor="middle" class="title">SQMR-DynaQ 训练样本中的时间字段关系示意图</text>
  <text x="800" y="105" text-anchor="middle" class="subtitle">说明 time_us、feedback_time_us、packet_deadline_remaining_us 和 s_chosen_delay_us 的区别</text>

  <rect class="card" x="70" y="140" width="1460" height="280"/>
  <text x="130" y="190" class="label">1. 时间线视角</text>

  <line x1="180" y1="305" x2="1410" y2="305" class="timeline"/>
  <line x1="340" y1="275" x2="340" y2="335" class="tick"/>
  <line x1="980" y1="275" x2="980" y2="335" class="tick"/>
  <line x1="1320" y1="275" x2="1320" y2="335" class="tick"/>

  <circle cx="340" cy="305" r="10" class="dot-blue"/>
  <circle cx="980" cy="305" r="10" class="dot-orange"/>
  <circle cx="1320" cy="305" r="10" class="dot-purple"/>

  <text x="300" y="250" class="box-title">决策时刻</text>
  <text x="287" y="365" class="math">time_us</text>

  <text x="905" y="250" class="box-title">反馈确认时刻</text>
  <text x="878" y="365" class="math">feedback_time_us</text>

  <text x="1245" y="250" class="box-title">packet 失效时刻</text>
  <text x="1198" y="365" class="math">creation_time + deadline</text>

  <path d="M355 220 C470 170, 760 170, 965 220" class="arrow-blue"/>
  <text x="640" y="165" text-anchor="middle" class="math">feedback_time_us - time_us</text>
  <text x="640" y="193" text-anchor="middle" class="text">一次动作从执行到得到反馈所经历的真实时间</text>

  <path d="M355 392 C520 438, 940 438, 1305 392" class="arrow-orange"/>
  <text x="835" y="470" text-anchor="middle" class="math">packet_deadline_remaining_us</text>
  <text x="835" y="498" text-anchor="middle" class="text">在决策时刻，该数据包距离过期还剩下的时间</text>

  <rect class="gray-box" x="1050" y="160" width="390" height="72"/>
  <text x="1075" y="190" class="box-title">注意</text>
  <text x="1075" y="218" class="box-text">deadline 剩余时间是 packet 的寿命约束，</text>
  <text x="1075" y="242" class="box-text">不是本次动作真实耗时。</text>

  <rect class="blue-box" x="90" y="470" width="460" height="170"/>
  <text x="115" y="510" class="box-title">2. time_us</text>
  <text x="115" y="548" class="box-text">表示当前节点开始做“选下一跳”决策的时刻。</text>
  <text x="115" y="580" class="box-text">这一时刻对应强化学习中的当前状态 s 和动作 a。</text>
  <text x="115" y="612" class="box-text">节点在此刻观察邻居、LQ、Q 值、trust 值、</text>
  <text x="115" y="644" class="box-text">deadline 剩余时间等信息，然后输出动作。</text>

  <rect class="orange-box" x="570" y="470" width="460" height="170"/>
  <text x="595" y="510" class="box-title">3. feedback_time_us</text>
  <text x="595" y="548" class="box-text">表示本次动作结果被确认的时刻。</text>
  <text x="595" y="580" class="box-text">结果可能来自 ACK、ACK 超时、watchdog 成功、</text>
  <text x="595" y="612" class="box-text">watchdog 失败等反馈。</text>
  <text x="595" y="644" class="box-text">这一时刻对应 reward 和下一状态 s' 被写回样本。</text>

  <rect class="purple-box" x="1050" y="470" width="460" height="170"/>
  <text x="1075" y="510" class="box-title">4. packet_deadline_remaining_us</text>
  <text x="1075" y="548" class="box-text">表示在 time_us 时刻，packet 距离失效还剩多少时间。</text>
  <text x="1075" y="580" class="box-text">它体现的是任务时限压力，直接影响 required_velocity</text>
  <text x="1075" y="612" class="box-text">和候选邻居筛选。</text>
  <text x="1075" y="644" class="math">= creation_time + deadline - time_us</text>

  <rect class="gray-box" x="90" y="690" width="1420" height="150"/>
  <text x="115" y="730" class="box-title">5. s_chosen_delay_us 与上面三个时间量的区别</text>
  <text x="115" y="768" class="box-text">s_chosen_delay_us 不是决策发生时刻，也不是反馈返回时刻，更不是 packet 剩余寿命。</text>
  <text x="115" y="800" class="box-text">它表示当前节点在做决策时，对“被选中下一跳这一跳链路大概要花多久”的历史估计值。</text>
  <text x="115" y="832" class="box-text">因此：time_us / feedback_time_us 描述动作交互过程；packet_deadline_remaining_us 描述时限约束；s_chosen_delay_us 描述链路时延特征。</text>

  <path d="M1170 640 C1230 675, 1280 690, 1360 690" class="arrowGray"/>
  <text x="1235" y="675" class="small">是状态特征，不是动作反馈时间</text>
</svg>
